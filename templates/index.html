<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .title-text {
    font-family: 'Poppins', sans-serif;
}
        .header {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: 100%;
}

.header h1 {
    margin: 0;
}
        .title-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 32px;
    letter-spacing: 1px;
}
        .dark-mode {
    background: #0f172a !important;
    color: white;
}

.dark-mode .container-fluid {
    background: rgba(255, 255, 255, 0.08);
}

.dark-mode textarea {
    background: #111827;
    color: white;
    border: 1px solid #444;
}

.dark-mode .disclaimer {
    background: rgba(255,255,255,0.1);
    color: #ddd;
}
        @keyframes glow {
    0% { box-shadow: 0 0 5px #fff; }
    50% { box-shadow: 0 0 20px #fff; }
    100% { box-shadow: 0 0 5px #fff; }
}

.dark-mode .container-fluid {
    animation: glow 2s infinite;
}
        body {
            font-family: 'Segoe UI', sans-serif;

            background: linear-gradient(270deg, #667eea, #764ba2, #5b86e5);
            background-size: 400% 400%;
            animation: bgMove 8s ease infinite;

            height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
    width: 100%;
    max-width: 700px;   /* controls size of your app */
    margin: auto;       /* centers horizontally */
    
    background: rgba(255, 255, 255, 0.25);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    padding: 40px;
    border-radius: 15px;
    text-align: center;

    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
}
        /* ✅ NEW HEADER STYLE (ONLY ADDITION) */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .logo-img {
            width: 50px;
        }

        .title-text {
            margin: 0;
            font-size: 28px;
        }

        .textarea-wrapper {
            position: relative;
        }

        textarea {
            width: 100%;
            height: 140px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-top: 20px;
            font-size: 15px;
        }

        .clear-btn {
            position: absolute;
            bottom: 10px;
            right: 12px;
            background: none;
            border: none;
            color: red;
            font-size: 18px;
            cursor: pointer;
        }

        .clear-btn:hover {
            transform: scale(1.2);
        }

        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .analyze-btn {
            background: linear-gradient(135deg, #ff7e5f, #feb47b);
        }

        .mic-btn {
            background: linear-gradient(135deg, #36d1dc, #5b86e5);
            margin-left: 10px;
        }

        .listening {
            background: red !important;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1); }
        }

        button:hover {
            transform: scale(1.05);
        }

        .robot {
            font-size: 50px;
            margin: 10px auto;
            animation: float 2s ease-in-out infinite;
        }

        @keyframes float {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .progress {
            width: 100%;
            background: #eee;
            border-radius: 10px;
            margin-top: 20px;
            height: 15px;
            overflow: hidden;
            display: none;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(270deg, #36d1dc, #5b86e5, #ff7e5f);
            background-size: 400% 400%;
            transition: width 0.5s ease;
            box-shadow: 0 0 12px rgba(91, 134, 229, 0.7);
        }

        .loading {
            animation: gradientMove 2s ease infinite;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .result-card {
            margin-top: 15px;
            padding: 15px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            opacity: 0;
            transform: scale(0.9);
        }

        .fade-in {
            animation: fadeZoom 0.5s ease forwards;
        }

        @keyframes fadeZoom {
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .fake {
            background: linear-gradient(135deg, #ff4b5c, #ff0000);
        }

        .real {
            background: linear-gradient(135deg, #00c853, #2e7d32);
        }

        #confidenceLevel {
            margin-top: 5px;
            font-size: 16px;
            font-weight: bold;
        }

        .disclaimer {
            margin-top: 15px;
            font-size: 13px;
            color: #555;
            background: #f3f3f3;
            padding: 10px;
            border-radius: 8px;
        }

        @media (max-width: 576px) {
            .container {
                padding: 20px;
                margin: 10px;
            }

            .mic-btn {
                margin-left: 0;
                margin-top: 10px;
            }

            .header {
                flex-direction: column;
            }
        }
    </style>
</head>

<body>

<div class="container-fluid">
    <button id="darkToggle" style="position:absolute; top:15px; right:15px; border:none; background:black; color:white; padding:6px 10px; border-radius:6px;">
    🌙
</button>
    <!-- ✅ PROFESSIONAL HEADER -->
    <div class="header">
        <img src="{{ url_for('static', filename='logo.jpeg') }}" class="logo-img">
        <h1 class="title-text">🤖 AI Fake News Detector</h1>
    </div>

    <div class="robot">🤖</div>

    <div class="textarea-wrapper">
        <textarea id="newsInput" placeholder="📰 Paste or speak news here..."></textarea>
        <button class="clear-btn" onclick="clearText()">×</button>
    </div>

    <div class="d-flex flex-column flex-md-row justify-content-center">
        <button class="analyze-btn" onclick="analyzeNews()">🚀 Analyze</button>
        <button id="micBtn" class="mic-btn" onclick="startVoice()">🎤 Speak</button>
    </div>

    <div class="disclaimer">
        ⚠️ This AI system is still under development and may occasionally produce incorrect results.
    </div>

    <div id="predictionCard" class="result-card"></div>

    <div class="progress">
        <div class="progress-bar" id="bar"></div>
    </div>

    <div>
        <h3 id="confidence"></h3>
        <h4 id="confidenceLevel"></h4>
    </div>

</div>
<script>
window.onload = function () {
    const toggleBtn = document.getElementById("darkToggle");

    if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark-mode");
        toggleBtn.innerHTML = "☀️";
    }

    toggleBtn.onclick = function () {
        document.body.classList.toggle("dark-mode");

        if (document.body.classList.contains("dark-mode")) {
            toggleBtn.innerHTML = "☀️";
            localStorage.setItem("theme", "dark");
        } else {
            toggleBtn.innerHTML = "🌙";
            localStorage.setItem("theme", "light");
        }
    };
};

// ✅ ADD BACK THESE FUNCTIONS

function clearText() {
    document.getElementById("newsInput").value = "";
}

function analyzeNews() {
    const text = document.getElementById("newsInput").value;

    if (text.trim() == "") {
        alert("⚠️ Please enter or speak news");
        return;
    }

    const bar = document.getElementById("bar");
    const card = document.getElementById("predictionCard");

    document.querySelector(".progress").style.display = "block";
    bar.classList.add("loading");

    card.innerHTML = "🤖 AI is analyzing...";
    card.className = "result-card fade-in";

    fetch(window.location.origin + "/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {

        bar.classList.remove("loading");

        let percent = (data.score * 60 + 35).toFixed(2);
        bar.style.width = percent + "%";

        let isFake = data.label === "Fake";

        card.innerHTML = "Prediction: " + data.label;
        card.className = "result-card fade-in " + (isFake ? "fake" : "real");

        document.getElementById("confidence").innerHTML =
            "📊 Confidence: " + percent + "%";

        let levelColor = percent <= 40 ? "red" : percent <= 70 ? "orange" : "green";
        let levelText = percent <= 40 ? "Low Confidence" : percent <= 70 ? "Uncertain" : "High Confidence";

        document.getElementById("confidenceLevel").innerHTML = levelText;
        document.getElementById("confidenceLevel").style.color = levelColor;
    });
}

function startVoice() {
    if (!('webkitSpeechRecognition' in window)) {
        alert("❌ Voice not supported. Use Chrome browser.");
        return;
    }

    const btn = document.getElementById("micBtn");
    const recognition = new webkitSpeechRecognition();

    btn.innerHTML = "🔴 Listening...";
    btn.classList.add("listening");

    recognition.start();

    recognition.onresult = function (event) {
        document.getElementById("newsInput").value =
            event.results[0][0].transcript;

        btn.innerHTML = "🎤 Speak";
        btn.classList.remove("listening");
    };

    recognition.onend = function () {
        btn.innerHTML = "🎤 Speak";
        btn.classList.remove("listening");
    };
}
</script>
</body>
</html>
